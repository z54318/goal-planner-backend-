  contact: {}
  description: Goal Planner 后端接口文档
  title: Goal Planner Backend API
  version: "1.0"
paths:
  /api/admin/menus:
    get:
      operationId: adminMenusList
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/menu.MenuListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: 获取菜单列表
      tags:
      - menus
    post:
      consumes:
      - application/json
      operationId: adminMenuCreate
      parameters:
      - description: 菜单参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/menu.CreateMenuRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/menu.MenuResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
